<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhD Career Advisor · Jesse Thaler's Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat window ─────────────────────────────────────────── */
    .chat-window {
      width: 100%;
      max-width: 760px;
      height: 92vh;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .chat-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .header-text p {
      font-size: .8rem;
      opacity: .82;
      margin-top: 2px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* ── Message list ────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* ── Intro banner ────────────────────────────────────────── */
    .intro-banner {
      text-align: center;
      padding: 28px 16px 10px;
      color: #6b7280;
    }

    .intro-banner .icon { font-size: 2.4rem; margin-bottom: 8px; }
    .intro-banner h2 { font-size: 1.1rem; color: #374151; font-weight: 600; margin-bottom: 4px; }
    .intro-banner p  { font-size: .88rem; line-height: 1.5; max-width: 400px; margin: 0 auto; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }

    .suggestion-btn {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: .82rem;
      color: #4b5563;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .suggestion-btn:hover {
      background: #ede9fe;
      border-color: #a5b4fc;
      color: #4f46e5;
    }

    /* ── Bubbles ─────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 9px;
      max-width: 80%;
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-top: 2px;
    }

    .msg.assistant .msg-avatar { background: #ede9fe; }
    .msg.user      .msg-avatar { background: #dbeafe; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: .92rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.assistant .bubble {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
      color: #111827;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Input area ──────────────────────────────────────────── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: .92rem;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.45;
      transition: border-color .15s;
      background: #fafafa;
    }

    textarea:focus { border-color: #7c3aed; background: #fff; }
    textarea::placeholder { color: #9ca3af; }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }

    .send-btn:hover  { transform: scale(1.07); }
    .send-btn:active { transform: scale(.96); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ── Error notice ────────────────────────────────────────── */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: .85rem;
      align-self: center;
    }
  </style>
</head>
<body>

<div class="chat-window">
  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div class="header-text">
      <h1>PhD Career Advisor</h1>
      <p><span class="status-dot"></span>Jesse Thaler's Lab · Ask me anything</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="intro-banner" id="intro">
      <div class="icon">📚</div>
      <h2>Welcome to your career advisor!</h2>
      <p>I've read Jessie's career advice guide cover to cover. Ask me anything about academic careers, PhD life, research, or your next steps.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What are the key skills for a successful academic career?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">How do I choose between academia and industry?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Tips for writing a strong CV or resume</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">How should I approach job applications?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="userInput"
      rows="1"
      placeholder="Ask a question about your career…"
      onkeydown="handleKeydown(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const introEl    = document.getElementById('intro');

  // Conversation history sent to the API
  const history = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = role === 'user' ? '🧑‍🎓' : '🎓';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(avatarEl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function appendTypingIndicator() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing';

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = '🎓';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatarEl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Remove intro banner on first message
    if (introEl) introEl.remove();

    // Show user bubble
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Typing indicator
    const typingEl = appendTypingIndicator();

    let assistantBubble = null;
    let assistantText   = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));

          if (payload.error) {
            typingEl.remove();
            const err = document.createElement('div');
            err.className = 'error-msg';
            err.textContent = '⚠️ ' + payload.error;
            messagesEl.appendChild(err);
            scrollToBottom();
            break;
          }

          if (payload.done) break;

          if (payload.text) {
            if (!assistantBubble) {
              typingEl.remove();
              assistantBubble = appendMessage('assistant', '');
            }
            assistantText += payload.text;
            assistantBubble.textContent = assistantText;
            scrollToBottom();
          }
        }
      }

      if (assistantText) {
        history.push({ role: 'assistant', content: assistantText });
      }

    } catch (err) {
      typingEl.remove();
      const errEl = document.createElement('div');
      errEl.className = 'error-msg';
      errEl.textContent = '⚠️ Could not reach the server. Is the app running?';
      messagesEl.appendChild(errEl);
      scrollToBottom();
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
